services:
  builder:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ..:/workspace
      - npm-cache:/root/.npm
      - gradle-cache:/root/.gradle

  sync:
    extends:
      service: builder
    command: >
      bash -c "
        cp /workspace/packages/shared/syntaxes/qtn.tmLanguage.json /workspace/packages/vscode-extension/syntaxes/qtn.tmLanguage.json &&
        cp /workspace/packages/shared/syntaxes/qtn.tmLanguage.json /workspace/packages/jetbrains-plugin/src/main/resources/bundles/qtn.tmbundle/Syntaxes/qtn.tmLanguage.json &&
        cp /workspace/packages/shared/syntaxes/qtn.tmLanguage.json /workspace/packages/vs-extension/Grammars/qtn.tmLanguage.json
      "

  test:
    extends:
      service: builder
    command: >
      bash -c "
        cd /workspace/packages/language-server && npm ci --prefer-offline && npm test && npm run test:integration &&
        cd /workspace/packages/vscode-extension && npm ci --prefer-offline && npm test && npm run test:snap
      "

  vscode:
    extends:
      service: builder
    command: >
      bash -c "
        cp /workspace/packages/shared/syntaxes/qtn.tmLanguage.json /workspace/packages/vscode-extension/syntaxes/qtn.tmLanguage.json &&
        cd /workspace && npm ci --prefer-offline &&
        cd /workspace/packages/language-server && npm ci --prefer-offline &&
        cd /workspace/packages/vscode-extension && npm ci --prefer-offline &&
        npx vsce package --no-dependencies &&
        mkdir -p /workspace/dist/vscode &&
        cp /workspace/packages/vscode-extension/*.vsix /workspace/dist/vscode/
      "

  jetbrains:
    extends:
      service: builder
    command: >
      bash -c "
        cp /workspace/packages/shared/syntaxes/qtn.tmLanguage.json /workspace/packages/jetbrains-plugin/src/main/resources/bundles/qtn.tmbundle/Syntaxes/qtn.tmLanguage.json &&
        cd /workspace && npm ci --prefer-offline &&
        cd /workspace/packages/language-server && npm ci --prefer-offline &&
        cd /workspace && npm run bundle:server &&
        cd /workspace/packages/jetbrains-plugin && ./gradlew buildPlugin --build-cache &&
        mkdir -p /workspace/dist/jetbrains &&
        cp /workspace/packages/jetbrains-plugin/build/distributions/*.zip /workspace/dist/jetbrains/
      "

  all:
    extends:
      service: builder
    command: >
      bash -c "
        echo '=== Sync grammar ===' &&
        cp /workspace/packages/shared/syntaxes/qtn.tmLanguage.json /workspace/packages/vscode-extension/syntaxes/qtn.tmLanguage.json &&
        cp /workspace/packages/shared/syntaxes/qtn.tmLanguage.json /workspace/packages/jetbrains-plugin/src/main/resources/bundles/qtn.tmbundle/Syntaxes/qtn.tmLanguage.json &&
        cp /workspace/packages/shared/syntaxes/qtn.tmLanguage.json /workspace/packages/vs-extension/Grammars/qtn.tmLanguage.json &&
        echo '=== Test ===' &&
        cd /workspace/packages/language-server && npm ci --prefer-offline && npm test && npm run test:integration &&
        cd /workspace/packages/vscode-extension && npm ci --prefer-offline && npm test && npm run test:snap &&
        echo '=== Build VSCode ===' &&
        cd /workspace && npm ci --prefer-offline &&
        cd /workspace/packages/language-server && npm ci --prefer-offline &&
        cd /workspace/packages/vscode-extension && npx vsce package --no-dependencies &&
        echo '=== Build JetBrains ===' &&
        cd /workspace && npm run bundle:server &&
        cd /workspace/packages/jetbrains-plugin && ./gradlew buildPlugin --build-cache &&
        echo '=== Copy artifacts to dist ===' &&
        mkdir -p /workspace/dist/vscode /workspace/dist/jetbrains &&
        cp /workspace/packages/vscode-extension/*.vsix /workspace/dist/vscode/ &&
        cp /workspace/packages/jetbrains-plugin/build/distributions/*.zip /workspace/dist/jetbrains/ &&
        echo '=== All builds complete ==='
      "

volumes:
  npm-cache:
  gradle-cache:
